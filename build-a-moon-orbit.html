<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Earth and Moon Orbit</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      height: 100vh;              /* 100% del viewport */
      display: flex;              /* Flexbox */
      justify-content: center;    /* Centrado horizontal */
      align-items: center;        /* Centrado vertical */
    }

    /* Contenedor principal */
    .space {
      width: 200px;
      height: 200px;
      position: relative;         /* Para posicionar hijos en base a este contenedor */
    }

    /* Tierra */
    .earth {
      width: 100px;
      height: 100px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: blue;
      border-radius: 50%;
    }

    /* Órbita */
    .orbit {
      width: 200px;
      height: 200px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: orbit 5s linear infinite;
    }

    /* Luna */
    .moon {
      width: 30px;
      height: 30px;
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      background-color: gray;
      border-radius: 50%;
    }

    /* Animación de la órbita */
    @keyframes orbit {
      0% {
        transform: rotate(0deg) translate(-50%, -50%);
      }
      100% {
        transform: rotate(360deg) translate(-50%, -50%);
      }
    }

  </style>
</head>
<body>
  <div class="space">
    <div class="earth"></div>
    <div class="orbit">
      <div class="moon"></div>
    </div>
  </div>
</body>
</html>
