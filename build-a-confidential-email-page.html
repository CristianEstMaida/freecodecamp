<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confidential Email</title>
  <!-- <link rel="stylesheet" href="styles.css" > -->
  <style>
    #email {
      box-sizing: border-box; /* Ensures padding + border are included in width */
      padding: 50px;
      margin-top: 50px;
      width: 500px;
      border: 2px solid black;
    }

    /* Confidential and Top Secret labels */
    #confidential, #top-secret {
      display: inline-block;
      padding: 10px;
      margin-left: 10px;
      border: 2px solid red;
      transform: rotate(-10deg);
      font-weight: bold;
    }

    #top-secret {
      border-color: blue;
      transform: rotate(10deg);
    }

    /* Blurred text */
    .blurred {
      filter: blur(3px);
    }
  </style>

</head>

<body>
<main id="email">
    <div id="confidential">CONFIDENTIAL</div>
    <div id="top-secret">TOP SECRET</div>

    <p>
      This is a <span class="blurred">sensitive</span> paragraph with hidden details.
    </p>
    <p>
      Another <span class="blurred">classified</span> section that should not be visible.
    </p>
    <p>
      Final <span class="blurred">restricted</span> note for authorized personnel only.
    </p>
  </main>


</body>

</html>
