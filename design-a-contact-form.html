<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Contact Form</title>
    <!-- <link rel="stylesheet" href="styles.css"> -->
    <style>
      .form-container {
        background-color: #f4f4f8;   /* 5: fondo */
        border-radius: 8px;          /* 16: esquinas redondeadas */
        padding: 2em;                /* 17: espacio interno */
        width: 400px;                /* 18: ancho */
        margin: 2em auto;            /* centrado */
      }

      label {
        display: block;
        margin: 0.5em 0;             /* 19: margen */
        color: #333;                 /* 19: color de fuente */
      }

      input {
        width: 100%;                 /* 20: ancho */
        padding: 0.5em;              /* 20: padding */
        margin-bottom: 1em;          /* 20: margen inferior */
        border: 1px solid #ccc;
        border-radius: 4px;
      }

      textarea {
        width: 100%;                 /* 21: ancho */
        padding: 0.5em;              /* 21: padding */
        margin-bottom: 1em;          /* 21: margen inferior */
        border: 1px solid #ccc;
        border-radius: 4px;
      }

      button{
        background-color: #4a90e2;   /* 22: color de fondo */
        color: #fff;
        font-size: 1.1em;            /* 23: tamaño de fuente */
        padding: 0.7em 1.2em;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }

      button:hover {
        background-color: #357ab8;   /* 24: hover cambia color */
      }
    
    </style>
</head>

<body>
<div class="form-container">
    <form>
      <h2>Formulario de Registro</h2>

      <label for="name">Nombre:</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Correo electrónico:</label>
      <input type="email" id="email" name="email" required>

      <label for="message">Mensaje:</label>
      <textarea id="message" name="message" required></textarea>

      <button type="submit">Submit</button>
    </form>
  </div>


</body>

</html>
