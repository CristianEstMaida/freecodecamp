<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tribute Page</title>
  <!-- <link rel="stylesheet" href="styles.css"> -->
  <style>
    /* Imagen responsiva y centrada */
    #image {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    /* Estilo general */
    body {
      font-family: Arial, sans-serif;
      line-height: 1.6;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    #main {
      padding: 20px;
    }

    #img-caption {
      margin-top: 10px;
      font-style: italic;
    }


  </style>
</head>
<body>
  <main id="main">
    <h1 id="title">Dr. Norman Borlaug</h1>

    <figure id="img-div">
      <img id="image" src="borlaug.jpg" alt="Dr. Norman Borlaug in the field">
      <figcaption id="img-caption">
        Dr. Borlaug inspecting wheat crops during his research.
      </figcaption>
    </figure>

    <section id="tribute-info">
      <p>
        Dr. Norman Borlaug was an American agronomist who led initiatives worldwide
        that contributed to the extensive increases in agricultural production
        known as the Green Revolution.
      </p>
    </section>

    <p>
      Learn more about his life and work at
      <a id="tribute-link" href="https://en.wikipedia.org/wiki/Norman_Borlaug" target="_blank">
        Wikipedia
      </a>.
    </p>
  </main>
</body>
</html>
